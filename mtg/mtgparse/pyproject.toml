[tool.pylint.messages_control]
disable = [
  "missing-module-docstring",
  "missing-function-docstring",
  "missing-class-docstring",
  "invalid-name",
  "duplicate-code",
  "line-too-long",
  "too-many-locals",
  "too-many-statements",
  "too-many-branches",
  "too-many-nested-blocks",
  "too-many-arguments",
  "too-many-positional-arguments",
  "fixme",
]

[tool.pylint.format]
max-line-length = 88

[tool.black]
line-length = 88

[tool.mypy]

disable_error_code = ["import-untyped"]
